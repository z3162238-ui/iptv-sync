name: Auto-Refresh IPTV Playlist

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:
    inputs:
      filter:
        description: 'Comma-separated list of IDs/names/countries to include (optional)'
        required: false
        default: ''
      filter_by:
        description: 'How to interpret filter values: id | name | country'
        required: false
        default: 'id'
      channels_url:
        description: 'Optional channels.csv raw URL (overrides default)'
        required: false
        default: ''
      streams_url:
        description: 'Optional streams.csv raw URL (overrides default)'
        required: false
        default: ''

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Ensure data dir
        run: mkdir -p data

      - name: Download iptv-org CSVs (verbose / fail if channels missing; streams fallback to main)
        run: |
          set -euo pipefail
          set -x
          CH_URL="${{ github.event.inputs.channels_url || '' }}"
          ST_URL="${{ github.event.inputs.streams_url || '' }}"
          # default pinned commit for channels (reproducible)
          if [ -z "$CH_URL" ]; then
            CH_URL="https://raw.githubusercontent.com/iptv-org/database/c1daa31fa3aba48160fc6fa8d5863df261dfd092/data/channels.csv"
          fi
          # for streams try the same pinned commit, but fall back to main if missing
          if [ -z "$ST_URL" ]; then
            ST_URL_PINNED="https://raw.githubusercontent.com/iptv-org/database/c1daa31fa3aba48160fc6fa8d5863df261dfd092/data/streams.csv"
            ST_URL_MAIN="https://raw.githubusercontent.com/iptv-org/database/main/data/streams.csv"
          else
            ST_URL_PINNED="$ST_URL"
            ST_URL_MAIN=""
          fi

          echo "Fetching channels from $CH_URL"
          if ! curl -fsSL "$CH_URL" -o data/channels.csv; then
            echo "ERROR: failed to fetch channels.csv from $CH_URL"
            exit 1
          fi
          echo "Fetched channels.csv (size: $(stat -c%s data/channels.csv) bytes)"
          head -n 5 data/channels.csv || true

          # Attempt pinned streams URL first, then fallback to main
          if [ -n "${ST_URL_PINNED:-}" ]; then
            echo "Trying streams from pinned commit: $ST_URL_PINNED"
            HTTP_CODE=$(curl -s -w "%{http_code}" -o data/streams.csv.tmp "$ST_URL_PINNED" || true)
            if [ "$HTTP_CODE" = "200" ]; then
              mv data/streams.csv.tmp data/streams.csv
              echo "Fetched streams.csv from pinned commit (size: $(stat -c%s data/streams.csv) bytes)"
              head -n 5 data/streams.csv || true
            else
              echo "Pinned streams.csv not present (HTTP $HTTP_CODE); removing tmp and trying main"
              rm -f data/streams.csv.tmp || true
              if [ -n "${ST_URL_MAIN:-}" ]; then
                echo "Trying streams from main: $ST_URL_MAIN"
                if curl -fsSL "$ST_URL_MAIN" -o data/streams.csv; then
                  echo "Fetched streams.csv from main (size: $(stat -c%s data/streams.csv) bytes)"
                  head -n 5 data/streams.csv || true
                else
                  echo "streams.csv not available from main either; continuing without streams.csv"
                fi
              fi
            fi
          else
            # user supplied a streams_url input — try it
            echo "Using user-provided streams_url: $ST_URL"
            if curl -fsSL "$ST_URL" -o data/streams.csv; then
              echo "Fetched streams.csv from streams_url (size: $(stat -c%s data/streams.csv) bytes)"
              head -n 5 data/streams.csv || true
            else
              echo "streams.csv not available from provided streams_url; continuing without streams.csv"
            fi
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate index.m3u
        env:
          FILTER: ${{ github.event.inputs.filter }}
          FILTER_BY: ${{ github.event.inputs.filter_by }}
          CHANNELS_URL: ${{ github.event.inputs.channels_url }}
          STREAMS_URL: ${{ github.event.inputs.streams_url }}
        run: |
          echo "Node version: $(node -v); npm: $(npm -v)"
          node --version
          node scripts/generate_m3u.js --channels data/channels.csv --streams data/streams.csv --output index.m3u

      - name: Show generated file (if present)
        run: |
          if [ -f index.m3u ]; then
            echo "index.m3u size: $(stat -c%s index.m3u) bytes"
            head -n 40 index.m3u || true
          else
            echo "index.m3u not created"
          fi

      - name: Commit and push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.m3u || true
          if ! git diff --cached --exit-code; then
            git commit -m "Auto-refresh IPTV playlist [skip ci]" || true
            git push
          else
            echo "No changes to index.m3u"
          fi
