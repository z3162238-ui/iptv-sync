name: Auto-Refresh IPTV Playlist

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:
    inputs:
      filter:
        description: 'Comma-separated list of IDs/names/countries to include (optional)'
        required: false
        default: ''
      filter_by:
        description: 'How to interpret filter values: id | name | country'
        required: false
        default: 'id'
      channels_url:
        description: 'Optional channels.csv raw URL (overrides default)'
        required: false
        default: ''
      streams_url:
        description: 'Optional streams.csv raw URL (overrides default)'
        required: false
        default: ''

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Ensure data dir
        run: mkdir -p data

      - name: Download iptv-org CSVs (fail if channels missing)
        run: |
          set -euo pipefail
          CH_URL="${{ github.event.inputs.channels_url || '' }}"
          ST_URL="${{ github.event.inputs.streams_url || '' }}"
          # default to pinned commit or to main if not provided
          if [ -z "$CH_URL" ]; then
            CH_URL="https://raw.githubusercontent.com/iptv-org/database/c1daa31fa3aba48160fc6fa8d5863df261dfd092/data/channels.csv"
          fi
          if [ -z "$ST_URL" ]; then
            ST_URL="https://raw.githubusercontent.com/iptv-org/database/c1daa31fa3aba48160fc6fa8d5863df261dfd092/data/streams.csv"
          fi
          echo "Fetching channels from $CH_URL"
          if ! curl -fsSL "$CH_URL" -o data/channels.csv; then
            echo "ERROR: failed to fetch channels.csv from $CH_URL"
            exit 1
          fi
          echo "Fetched channels.csv (size: $(stat -c%s data/channels.csv) bytes)"
          head -n 5 data/channels.csv || true
          echo "Fetching streams from $ST_URL"
          if ! curl -fsSL "$ST_URL" -o data/streams.csv; then
            echo "Warning: streams.csv not available from $ST_URL; continuing without it"
          else
            echo "Fetched streams.csv (size: $(stat -c%s data/streams.csv) bytes)"
            head -n 5 data/streams.csv || true
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate index.m3u
        env:
          FILTER: ${{ github.event.inputs.filter }}
          FILTER_BY: ${{ github.event.inputs.filter_by }}
          CHANNELS_URL: ${{ github.event.inputs.channels_url }}
          STREAMS_URL: ${{ github.event.inputs.streams_url }}
        run: |
          echo "Node version: $(node -v); npm: $(npm -v)"
          node --version
          node scripts/generate_m3u.js --channels data/channels.csv --streams data/streams.csv --output index.m3u

      - name: Show generated file (if present)
        run: |
          if [ -f index.m3u ]; then
            echo "index.m3u size: $(stat -c%s index.m3u) bytes"
            head -n 40 index.m3u || true
          else
            echo "index.m3u not created"
          fi

      - name: Commit and push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.m3u || true
          if ! git diff --cached --exit-code; then
            git commit -m "Auto-refresh IPTV playlist [skip ci]" || true
            git push
          else
            echo "No changes to index.m3u"
          fi
