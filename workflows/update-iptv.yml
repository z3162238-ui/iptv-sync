name: Auto-Refresh IPTV Playlist

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:
    inputs:
      filter:
        description: 'Comma-separated list of IDs/names/countries to include (optional)'
        required: false
        default: ''
      filter_by:
        description: 'How to interpret filter values: id | name | country'
        required: false
        default: 'id'
      channels_url:
        description: 'Optional channels.csv raw URL (overrides default)'
        required: false
        default: ''
      streams_url:
        description: 'Optional streams.csv raw URL (overrides default)'
        required: false
        default: ''

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Ensure data dir
        run: mkdir -p data

      - name: Download iptv-org CSVs (if not present)
        run: |
          set -e
          CH_URL="${{ github.event.inputs.channels_url || '' }}"
          ST_URL="${{ github.event.inputs.streams_url || '' }}"
          if [ -z "$CH_URL" ]; then
            CH_URL="https://raw.githubusercontent.com/iptv-org/database/main/data/channels.csv"
          fi
          if [ -z "$ST_URL" ]; then
            ST_URL="https://raw.githubusercontent.com/iptv-org/database/main/data/streams.csv"
          fi
          echo "Fetching channels from $CH_URL"
          curl -fsSL "$CH_URL" -o data/channels.csv || (echo "Failed to fetch channels.csv" && exit 0)
          echo "Fetching streams from $ST_URL"
          curl -fsSL "$ST_URL" -o data/streams.csv || echo "streams.csv not available - continuing"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate index.m3u
        env:
          FILTER: ${{ github.event.inputs.filter }}
          FILTER_BY: ${{ github.event.inputs.filter_by }}
          CHANNELS_URL: ${{ github.event.inputs.channels_url }}
          STREAMS_URL: ${{ github.event.inputs.streams_url }}
        run: |
          node scripts/generate_m3u.js --channels data/channels.csv --streams data/streams.csv --output index.m3u

      - name: Commit and push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.m3u
          if ! git diff --cached --exit-code; then
            git commit -m "Auto-refresh IPTV playlist [skip ci]" || true
            git push
          else
            echo "No changes to index.m3u"
          fi
